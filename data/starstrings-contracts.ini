﻿GoblinG_Hurston_RecoverCargoFPS_S_Desc=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Resource Drive\nOUTSOURCE MANAGER: A. Carmichael\nRISK ASSESSMENT: Low\n\nFollowing a recent theft, we have learned that the outlaws responsible have distributed the stolen goods amongst various hideouts. As such, we are coordinating several strike teams to target each stash and take back our resources. \n\nYour assignment will be to recover the portion being stashed at <EM4>~mission(Location|Address)</EM4>. Handle these criminals and deliver the <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4> to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. Staff will process the cargo once delivered.\n\nThis operation’s success hinges on all contractors recovering their assigned cargo. As a result, you will be credited for the total amount retrieved from all outposts.\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM4>Scenario Progress Points 50</EM4>
GoblinG_Hurston_RecoverCargoFPS_L_Desc=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Resource Drive\nOUTSOURCE MANAGER: A. Carmichael\nRISK ASSESSMENT: High\n\nJust found out some outlaws ambushed one of our contractors and stole our cargo.\n\nWe will not allow shipping delays like this or the message it sends to other criminals. I want those resources recovered and delivered to us now.\n\nMy trackers show the <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4> have been taken to <EM4>~mission(Location|Address)</EM4>. Go there with a decently sized hauling ship and as many <EM4>allies</EM4> as you can muster, deal with those responsible, and secure Hurston’s property.\n\nOnce retrieved, take the cargo to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. Shipping coordinators will process it ASAP.\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM4>Scenario Progress Points 10</EM4>
GoblinG_Hurston_SupportAttackedShip_S_Desc=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Resource Drive\nOUTSOURCE MANAGER: A. Carmichael\nRISK ASSESSMENT: Moderate\n\nUrgent request. A Hurston contractor is being attacked by a group of outlaws at <EM4>~mission(Location|Address)</EM4>. Hurston would usually avoid diverting resources on a case like this, but management has prioritized every delivery in this resource drive.\n\nDispatch immediately to their last known position and <EM4>defend them until they can repair their quantum and escape</EM4>. I will approve compensation payment once they’ve delivered the materials and credit you with the cargo’s safe arrival.\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM4>Scenario Progress Points 22</EM4>
GoblinG_Hurston_SupportAttackedShip_L_Desc=HURSTON DYNAMICS OUTSOURCING\nCONTRACT: Resource Drive\nOUTSOURCE MANAGER: A. Carmichael\nRISK ASSESSMENT: High\n\nOne of our transporters is currently under attack at <EM4>~mission(Location|Address)</EM4>. Normally, the loss in cargo wouldn’t be worth the expense of hiring combat support, but they’re carrying a significant amount of mining materials that Hurston needs.\n\nI need someone who can go and defend the transport ship <EM4>until they're able to complete repairs and escape</EM4>. Do not underestimate these outlaws, <EM4>bring combat support to not make a bad situation worse</EM4>. Assist with this, and I’ll see you get credit for their delivery.\n\n\n** The information transmitted may contain confidential and/or privileged material. Any review, retransmission, dissemination or other use of or taking action in reliance upon this information by persons or entities other than the intended recipient is prohibited. **\n\n<EM4>Scenario Progress Points 45</EM4>
GoblinG_Crusader_RecoverCargoFPS_S_Desc=A small transport ship of ours has been intercepted by outlaws and its contents were stolen.\n\nThe good news is we’ve managed to track down some of these outlaws to <EM4>~mission(Location|Address)</EM4> and are looking for contractors with combat experience to deal with them and recover our <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4>. You’ll be working as part of a team covering multiple locations, so it’s crucial that everyone brings back as much of their assigned cargo as possible. Also, be on your guard, these outlaws aren’t likely to part with the cargo easily.\n\nOnce you’ve recovered the cargo, take it to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. Our logistics team will make sure it gets processed.\n\nIf you’re able to do this, we’ll be sure to credit you for the total amount of SCU recovered by all teams.\n\nGood luck.\n\n\nDenver Samuels\nContractor Liaison Officer\nCrusader Industries\n\n<EM4>Scenario Progress Points 50</EM4>
GoblinG_Crusader_RecoverCargoFPS_L_Desc=One of our transports was recently attacked by outlaws and while we’re relieved that the crew was spared, the cargo was stolen.\n\nIt’s of the utmost importance that we get the <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4> back, as it contains a large amount of vital materials needed for the UEE’s resource contest.\n\nLuckily, the outlaws that took our goods haven’t noticed that our trackers are still intact. Our cargo is being held at <EM4>~mission(Location|Address)</EM4>.\n\nThese outlaws are highly dangerous, so please arm yourself accordingly and <EM4>consider bringing allies</EM4>. Ideally, you’ll be able to recover all the cargo, but considering how dangerous the situation is, we will offer partial payment for whatever you’re able to retrieve.\n\nWhen you’ve recovered the cargo, safely transport it to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. Once it’s delivered, our team will handle it from there.\n\nTake care of yourself out there.\n\n\nDenver Samuels\nContractor Liaison Officer\nCrusader Industries\n\n<EM4>Scenario Progress Points 10</EM4>
GoblinG_Crusader_SupportAttackedShip_S_Desc=To all contractors with combat pilot experience: we need your help urgently.\n\nA small cargo vessel of ours is currently under fire from a group of outlaws at <EM4>~mission(Location|Address)</EM4>. We need a capable pilot to head out there and <EM4>help defend them as they prepare to quantum</EM4>.\n\nThey don’t have much time. The resources they’re carrying, however small, will make a difference in the UEE’s call for resources. If they can deliver them, we’ll be sure to compensate you appropriately.\n\n\nDenver Samuels\nContractor Liaison Officer\nCrusader Industries\n\n<EM4>Scenario Progress Points 22</EM4>
GoblinG_Crusader_SupportAttackedShip_L_Desc=Putting out an urgent call to all trusted contractors.\n\nOne of our large hauling ships transporting resources intended for the Second Life Initiative is currently under attack by a group of outlaws and needs help.\n\nThe ship has sustained some damage, but they’re holding on for now. We need a contractor with combat experience who can <EM4>defend them long enough to allow them to get their quantum system back online and escape</EM4>.\n\nOur system was tracking them to <EM4>~mission(Location|Address)</EM4> before we lost contact so I would start there. Due to the presence of a sizeable hostile force, we also <EM4>strongly advise bringing combat support with you</EM4>.\n\nWe’re desperate for help on this. If they’re able to complete their delivery, I’ll make sure you get credit for whatever SCU they drop off.\n\n\nDenver Samuels\nContractor Liaison Officer\nCrusader Industries\n\n<EM4>Scenario Progress Points 45</EM4>
GoblinG_ArcCorp_RecoverCargoFPS_S_Desc=Hi, it’s El.\n\nLooking for a decent enough contractor who isn’t afraid to take on some outlaws and recover the cargo they stole.\n\nSince my boss is breathing down my neck about the numbers we’re pulling for this Second Life thing, we’re organizing multiple teams to hit all of the gang’s stash houses. You’re being assigned to go to <EM4>~mission(Location|Address)</EM4>, deal with whatever’s going on over there, and bring the <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4> stashed there back.\n\nWhen you’ve got the stuff, take it to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. Our staff will get it logged for you.\n\nIf you can do your part and get as many boxes back as possible, we’ll make sure you’re given credit for everything the whole team brings back.\n\n\nElla Tieno\nContractor Liaison Officer\nArcCorp\n\n<EM4>Scenario Progress Points 50</EM4>
GoblinG_ArcCorp_RecoverCargoFPS_L_Desc=Hey, El here.\n\nGot a big problem. Outlaws have taken out one of our transport ships and stolen the cargo.\n\nThe resources on that ship were flagged for that UEE initiative and we’re going to be in a lot of trouble unless we get them back.\n\nFortunately, I had the good sense to put tags on the cargo, so we’ve managed to track it down to <EM4>~mission(Location|Address)</EM4>. Corporate has approved a sliding pay scale based on whatever you can bring back. Ideally that’s all <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4>, but we’ll take what we can get. Once you’ve got the cargo loaded up onto a decently size hauler, drop it off at a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. One of my colleagues will take care of the rest.\n\nThese outlaws mean business, so make sure you’re stocked up on weapons, supplies, and a <EM4>few friends</EM4> before you head out.\n\nGood luck! I’m sure you’ll do great.\n\n\nElla Tieno\nContractor Liaison Officer\nArcCorp\n\n<EM4>Scenario Progress Points 10</EM4>
GoblinG_ArcCorp_SupportAttackedShip_S_Desc=Sending out an urgent request to any available contractor with combat pilot experience.\n\nA small transport ship of ours is currently being attacked by a group of outlaws at <EM4>~mission(Location|Address)</EM4>.\n\nThere’s a huge push for each delivery to help us to win this Second Life initiative, so we need someone to get over there, sort those outlaws out, and allow our transporter time to escape.\n\nNeedless to say, we’ll pay you if our hauler manages to deliver the goods and you’ll get credited for the SCU.\n\nGotta go,\n\n\nElla Tieno\nContractor Liaison Officer\nArcCorp\n\n<EM4>Scenario Progress Points 22</EM4>
GoblinG_ArcCorp_SupportAttackedShip_L_Desc=Outlaws have hit an ArcCorp transport ship over at <EM4>~mission(Location|Address)</EM4> and they need urgent help defending it.\n\nThe cargo aboard is of vital importance to our standing in the Second Life resource drive, and we can’t afford to lose it. The captain and crew said they’re doing their best to hang on and get their quantum drive repaired, but honestly, I don’t think they have a chance at escaping unless they get some help. If they do make it back in one piece, I’ll make sure you get shared credit for the delivery.\n\nDon’t underestimate these outlaws. <EM4>Bring as much firepower as you got and some backup</EM4> if you can.\n\n\nElla Tieno\nContractor Liaison Officer\nArcCorp\n\n<EM4>Scenario Progress Points 45</EM4>
GoblinG_MicroTech_RecoverCargoFPS_S_Desc=A group of outlaws have been targeting our smaller transport ships and as a result, a number of crucial resources that are needed for the UEE’s drive have been stolen from us.\n\nOur trackers are showing that these outlaws have spread the cargo across several locations. We need someone who can work as a part of a wider recovery team and retrieve the portion of the shipment being stashed at <EM4>~mission(Location|Address)</EM4>. The outlaws there will be heavily armed, so plan accordingly.\n\nOnce you have the <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4> in your possession, deliver them to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. In addition to the specific materials you personally return, you will share credit for all the stolen items recovered from other sites.\n\nLooking forward to hearing of your success.\n\n\nAster Remmington\nContractor Liaison Officer\nmicroTech\n\n<EM4>Scenario Progress Points 50</EM4>
GoblinG_MicroTech_RecoverCargoFPS_L_Desc=Outlaws have been targeting the valuable resources we need to compete in the UEE initiative. Fortunately, implanted trackers in the cargo indicate that it’s being held at <EM4>~mission(Location|Address)</EM4>. We just need someone to go and get it.\n\nThis situation is far from optimal, but I’m hoping you’ll be able to deal with the thieves and return the <EM4>~mission(ItemsToRecover) cargo boxes (all ~mission(MaxBoxSize) SCU or smaller)</EM4> to us. I’ve done some quick calculations on the number of reported outlaws and would advise bringing <EM4>additional support</EM4> if possible.\n\nAfter you’ve recovered the cargo, you can bring it to a freight elevator at: <EM4>~mission(Destination|Address|ListAll)</EM4>. Our logistics team can process it from there.\n\nObviously, the more you can recover the better, but we’ll take whatever you can get.\n\nBest of luck with this one, you’ll need it.\n\n\nAster Remmington\nContractor Liaison Officer\nmicroTech\n\n<EM4>Scenario Progress Points 10</EM4>
GoblinG_MicroTech_SupportAttackedShip_S_Desc=Got an urgent contract: a small cargo ship of ours is currently under attack by outlaws.\n\nOur team was able to pinpoint their location to <EM4>~mission(Location|Address)</EM4>, but they’ve stopped responding to comms.\n\nHead to their location and see if you can <EM4>keep the outlaws occupied long enough for our hauler to escape</EM4>.\n\nIf the hauler is able to escape, I will personally ensure you are credited for any cargo they deliver.\n\nGood luck and do your best.\n\n\nAster Remmington\nContractor Liaison Officer\nmicroTech\n\n<EM4>Scenario Progress Points 22</EM4>
GoblinG_MicroTech_SupportAttackedShip_L_Desc=This one is urgent. A transport ship of ours is currently under attack. They were able to share their last known location of <EM4>~mission(Location|Address)</EM4> shortly before losing contact.\n\nSince this is a high-risk situation, <EM4>we strongly suggest you bring backup</EM4>. I have every confidence that you and your crew will be able to <EM4>occupy the outlaws long enough for the ship to complete repairs and escape with its cargo</EM4>.\n\nOutside of the contract’s payment, you’ll receive credit for the resources they deliver.\n\nLooking forward to hearing of your success.\n\n\nAster Remmington\nContractor Liaison Officer\nmicroTech\n\n<EM4>Scenario Progress Points 45</EM4>
RepairOxygenKiosk_DescriptionLong=Hello Guests,\n\nWe have recently been alerted that one of our Oxygen Dispensers has suffered a technical error. As you know these kiosks are vital to ensure that you have plenty of oxygen handy while participating in our Work Release Program.\n\nWe are looking for any available guest to reset the kiosk. That should reconnect the kiosk to the network and resolve the issue. The first guest who's able to complete this task will not only be compensated with merits, but also with the satisfaction that they're making the workplace safer for other guests.\n\nThank you.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Recipes_Desc_SandArmour=Hello, know many humans want saldynium for regen problem. Credits good, yes, but Wikelo can use that, kopion horn, and other things to make special armor. \n\nOnce done, you be very tough. Very scary.\n\nYou see items needed. Bring to <EM4>~mission(destination|ListAll)</EM4> and I make for you.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 25
TheCollector_Recipes_Desc_KopSkull=Hello. Can make fun change to gun if you want. Use kopion skin for pattern and little skull dangle. Very effective. Shoot much better.\n\nAll you need is bring me parts to <EM4>~mission(destination|ListAll)</EM4> and will make. \n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_MiltSkull=Hello. Can do version of gun if you kopion soldier. Make material like soldier camouflage but with dead skull on front. Gun shoot better too.\n\nIf want, bring part to <EM4>~mission(destination|ListAll)</EM4> and will make.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_IrrArm=Wikelo had exciting idea during brief work rest. Was thinking about the little glow worms in Pyro and saw armor get changed to look like.\n\nIf you get me parts, bring to <EM4>~mission(destination|ListAll)</EM4> and will make for you then you can glow too.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 25
TheCollector_Recipes_Desc_VoltThwack=You feel like gun not angry enough? VOLT shotgun very powerful, very dangerous, but not scary? Bring to me. Can make very scary and angry.\n\nThey respect you then. Bring to <EM4>~mission(destination|ListAll)</EM4> and we make.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_ZipZap=Want to shoot long away and stay hiding. But it snowing? Wikelo have gun for you.\n\nBring things. I give.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_Hush=You want be hidden. Wikelo understand. Not ask questions why. But what do when you in snow? Wikelo have suit for that.\n\nWelcome.\n\n<EM4>Reputation Awarded:</EM4> 25
TheCollector_Recipes_Desc_Molten=If you have armor, Wikelo can make it look warm. Good look for useful armor. Bring me things and will do.\n\n<EM4>Reputation Awarded:</EM4> 25
TheCollector_Recipes_Desc_SlimyLMG=This gun has picture of amazing creature on side. Use it and it make you big and strong like Yormandi. Spit lightning. Bring my items and then you get it. Bye.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_Battle=Bring me armor and other things and I give you special test armor. First version. Very special. Bring and I give. Bye.\n\n<EM4>Reputation Awarded:</EM4> 25
TheCollector_Recipes_Desc_SpikeyArmor=Vanduul have strange ways. I never talk to them, old souli used to, but not Wikelo. Anyway, though not friendly, they make interesting thing. If you like, Wikelo can make you look more like.\n\nBring things. Will do.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 25
TheCollector_Recipes_Desc_BigBooma=Wikelo find very strange but functional weapon while wandering through your systems. It very simple but very effective. If you bring me things, I show you what I do to it.\n\nVery fun.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_NonePistol=You need a good weapon, yes? Have one for you. Small but powerful. Like an extra spicy balalu pepper. Wikelo make this pistol look extra spicy too. You bring things I need and I do a trade.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_GMNI_Shotgun=Shooting can be messy. Red Human Blood everywhere. Not a problem with this shotgun. Splashes blends right in! I give it to you if you give me everything I want on list. Good trade.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_RedHunterArmor=Wikelo hear that Humans think red is the color of passion and anger. This armor good for both. You give me items on list and this red armor is yours.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Recipes_Desc_VGLflightsuit=Ships have big windows. Everyone can see you flying. You should look the best. Wikelo has very good flight suit for you. Do trade, bring me what I need and Wikelo give suit. Give blueprint as well if you do not have.\n\n<EM4>Reputation Awarded:</EM4> 10\n<EM4>Multiple Blueprint Pools</EM4>\n<EM4>Pool 1</EM4>\n- Tailwind Flight Suit Dominion Camo\n\n<EM4>Pool 2</EM4>\n- Tailwind Flight Helmet Dominion Camo\n
TheCollector_Recipes_Desc_NoneAR=This rifle is very good at shooting, but could have nicer design. Wikelo fix. Looks very nice now. Give to you for trade. Bring me things, I give you rifle. Even give you blueprint if you need.\n\n<EM4>Reputation Awarded:</EM4> 10\n\n<EM4>Potential Blueprints</EM4>\n- Killshot "Dominion Camo" Rifle\n
TheCollector_Intro_Desc=Hello, I am Wikelo. Recent addition to your system and very excited to be here. Spent many time here in UEE and happy to spent more.\n\nHave place where I make things from other things.\n\nNeed person to bring me useful things to finish project I work on. You have list. Get, please. I am at <EM4>~mission(destination|ListAll)</EM4>.\n\nWill give you item for your help.\n\nAlso, when done, if you want to do more. Have many things can make in my humble shop. Come, look at pretty poster and then decide what you want me to make.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 10
TheCollector_Ships_Fortune_Indus_Desc=Hello, practicing on making ship fly better. Xi'an help human make ship. Fly good. Salvage good. But Wikelo can make better if you want. Bring things and will do. Bye.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_Nox_Desc=Wikelo know many Xi'an. Talk slow but very interesting if you have patience. This is very fast little thing to get you across planet. Wikelo made a few tweaks to make it zippier. If you want, Wikelo will make for you. Bye.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Ships_Intrepid_Desc=If you are looking for Intrepid ship that more intrepid. Wikelo can help. Bring things and you will get special touches on ship by Wikelo and pretty new coat to it. Bye.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_Pulse_Desc=Wikelo really like this little Human ship. Pulse feel very fast. Can have many configuration to make Pulse go faster. If you want, can give you configurated Pulse that I like. Have list of what I want for job. Bye.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Ships_Ursa_Desc=Wikelo branching into ships too. Took a look at Ursa and improved. Bring parts for me and I will make for you. Explore planet better. Go do.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Ships_GuardianQI_Desc=Insect ship again. This one help take down other ship but if you want it to take down better. Can make. See list and tell Wikelo. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Firebird_Desc=Been digging into Aegis Sabre ship. Firebird is very bomb-y. Good build but could make some fun change to it. If you want, I can do. Have a look and tell me. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Scorpius_Desc=Don't know what the name mean, but ship is very fast, very good in fight. With tweak, can better. You see list of what Wikelo need, go get and I make. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_F7_MK2_Desc=Know how much you Humans like Navy so Wikelo have one now. If you want Wikelo version of F7 mk2, bring me things and you are in. Very funny. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_ZeusES_Desc=Wikelo can make new version of Zeus ship. I know it important ship to Human. Not sure why, but yes, very useful ship. Anyway, can upgrade and make a little prettier. What I need listed, if you want, bring. Bye.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_ZeusCL_Desc=Wikelo can make new version of cargo Zeus ship. If you want, bring what needed, then you can have ship. Fair. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Peregrine_Desc=Wikelo not want to race but can still make fast ship faster. If you want, bring me things, and go faster.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_Spirit_C1_Desc=Wikelo love useful cargo ship. Spirit is very useful. If you want one, can make for you. Just bring me things and I will do. Bye.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_F8C_Mil_Desc=Can make you custom of F8 that take good fighting ship and make a better fighting ship. Bring things and I will make. Bye.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Ships_F8C_Stealth_Desc=Have the pieces to build useful ship for people who like to sneak then fight. Take F8C ship and make even better. Have put what Wikelo will need to build for you. Now you decide. Bye.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Ships_Starlift_Max_Desc=If you want to move many things. Hercules ship, very good for that. Wikelo even know souli back in Protectorate that started to use. Very big. Wikelo can give you similar version if you get what Wikelo need. Look at list and tell me.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Ships_Constellation_Taurus_Desc=Wikelo came across plans to build Constellation Taurus ship. Nice ship, but Wikelo make a little better. Prettier too. If you want, bring stuff.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Recipes_Desc_AtlsPew=Hello. Know you human like strange metal suit. How about metal suit with ikti? Sorry, ikti is Banu word, you call it 'gun.' \n\nIf want, bring things I say and I will make for you. Gun will shoot. Cause many damage.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Recipes_Desc_AtlsJump=Find very fun piece to add to big human suit that let you jump very high. Now you shoot and jump. Exciting.\n\nIf you want, bring me these to <EM4>~mission(destination|ListAll)</EM4>. Will make.\n\nWikelo\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Menu_Desc_PolarisShip=Wikelo recently get many blueprints in trade with human who not very smart. Now can make very big ship. \n\nNot cheap and need many pieces but will make. If you want, go quick, this cost much to Wikelo so won't be able to do for long but I like new Human system so I want to thank you all for welcome.\n\nBring to <EM4>~mission(destination|ListAll)</EM4> if want.\n\nBye.\n\n<EM4>Reputation Awarded:</EM4> 1,000
TheCollector_Mod_ATLS_Geo_Grad3_Desc=Wikelo give deep red and green colors to make ATLS legs look like they cooling from heat. Very pretty.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Mod_ATLS_Geo_Grad1_Desc=Wikelo travel to one Human planet and find very cold, but very pretty. This remind of that.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Mod_ATLS_Geo_Grad2_Desc=Many Human work place have orange color there. Must mean work to you. This suit does work. Make sense.\n\n<EM4>Reputation Awarded:</EM4> 20
TheCollector_Ships_Terrapin_Medic_Desc=Wikelo not know this Human word but ship is very useful when things go danger. If you want, can give new version of it. Maybe more useful?\n\nYou fly and tell. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Drake_Golem_Dec=Universe need resources so Wikelo always respect people who dig. Good profession. If you starting and want boost to Golem ship. I can do. \n\nBring. \n\nI make.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_Starlancer_ATC_Desc=If you like big space to move things, Wikelo can do useful and wonder things to MISC ship for you. Bring me pieces and I will give you version even better than what Xi'an can do.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Ships_Crusader_A2_Desc=Bring Wikelo the things and I make you A2 Starlifter that fights better. Does war so good make you call it A1! Bye.\n\n<EM4>Reputation Awarded:</EM4> 500
TheCollector_Ships_Starfighter_Ion_Desc=Starfighter Ion good ship, but it could be more sneak, yes? Surprise your not friends when you shoot them. I help with this for you. I need the right items and then I can give to you. Bring to me. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Starfighter_Inferno_Desc=Starfighter Inferno good ship, but what if you want it to be better ship at fighting? Wikelo knows just what to do. You bring me the items and I make it for you. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Prowler_Util_Desc=Wikelo work hard. You work hard. Prowler Utility work hard. But you bring me right items, I make it work more hard, then you work less hard. Bye.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Ships_Guardian_Desc=This ship look like insect in the Protectorate. Fun look. Painful sting. Wikelo can make custom version for you if you want. Make enemies sting. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_GuardianMX_Desc=You Humans enjoy strange letter combinations. It very funny. Guardian ship very useful but if you want even more useful, bring me things. I give you better ship. Look better. Act better.\n\nThank you. Bye.\n\n<EM4>Reputation Awarded:</EM4> 100
TheCollector_Ships_Meteor_Desc=Meteor big. It heavy. Have many guns. But Wikelo figure out way to make even better. You have things I will take to do.\n\nThat is all.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_MISC_Prospector_Desc=Wikelo loves rocks. Wants to help you get more better rocks. Made this Prospector more better for that tough job. Trade items and you can have.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_ARGO_Raft_Desc=RAFT is very useful. Wikelo take it and make it very very useful. Do work and make you happy. You want? Bring items to Wikelo for trade.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Ships_Anvil_Asgard_Desc=Wikelo mod Asgard and so that it fights more. You in a fight, this mod is what you want. Plus, good deal on the trade. Just bring items here and I give you the ship.\n\n<EM4>Reputation Awarded:</EM4> 250
TheCollector_Ships_Kruger_Wolf_Desc=If you want to be quiet and surprise people, this is the Wolf you want. Wikelo mod it to be extra stealth. Trade you for it when you bring me the items I want.\n\n<EM4>Reputation Awarded:</EM4> 30
TheCollector_Recipes_Desc_L22Wolf=Wikelo very excited. Have idea for new material. But making it is most tricky. Very complicated. Need help fabricating a test sample. I give you blueprint, you make, bring to me, and I will trade. Give you extra special L-22 Wolf. Very powerful, very wolf.\n\n<EM4>Potential Blueprints</EM4>\n- Metamaterial Test #146\n
Highpoint_KillAnimal_OneType_desc=We’ve been monitoring a situation at <EM4>~mission(Location)</EM4> regarding an uptick in the <EM4>~mission(Creature)</EM4> population over the past few months. Our models indicate that if this continues many of the native plants and animals will be adversely affected. It’s imperative that the <EM4>~mission(Creature)</EM4> population is reduced before that happens.     \n\nIf you can help, please refer to <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal for more specifics on the targeted creature.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded:</EM4> 1,000
Highpoint_KillAnimals_MultiType_M_desc=Highpoint Wilderness Specialists are dedicated to keeping the delicate ecosystems of the empire in balance. A client recently hired us to evaluate the environmental impact of a number of invasive creatures near <EM4>~mission(Location)</EM4>. We’ve determined that to preserve the natural order of the region a conscientious culling of these species is necessary.  \n\nLooking for someone able and willing to help in this effort. Please refer to <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal for further information on the creatures being targeted.     \n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded:</EM4> 2,000
Highpoint_KillAnimals_MultiType_H_desc=Native plants and animals near <EM4>~mission(Location)</EM4> are on the verge of environmental collapse due to the dramatic population spikes of several invasive species. We’ve been contracted to dramatically reduce the current population of these species to help avoid an environmental collapse. We need a dedicated and highly skilled exterminator to carry out this contract.     \n\nYou can better acquaint yourself with the creatures in question by referencing <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal.     \n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded:</EM4> 4,000
Highpoint_KillAnimals_AtLocation_desc=There’s a growing <EM4>~mission(Creature)</EM4> problem at <EM4>~mission(Location|address)</EM4>. Looking for a contractor to quickly and professionally take care of this infestation issue.  \n\nFor further details on the targeted creature, please refer to <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded:</EM4> 1,000
Highpoint_KillAnimals_AtLocation_multi_desc=A client has contacted us about resolving a <EM4>~mission(Creature)</EM4> infestation issue before it gets any worse. Several locations around <EM4>~mission(Location|address)</EM4> are currently beset by the creatures. There’s a growing concern that if this goes on for too much longer, then the natural habit will be ravaged beyond repair. Are you available to take care of this issue?\n\nYou can refer to <EM4>"The Guide to Stanton Wildlife"</EM4> in your Journal for more specific information on the targeted creature.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 2,000 / 4,000
Highpoint_KillAnimals_rockcracker_desc_E_001=If you have any work that's going to be bringing you to one of those old QV Breaker Stations in the Keeger Belt, we have something else that we could use your help on while you're there.\n \nWe've recently been contacted by the People's Alliance to assist with an initiative to help prepare these abandoned stations for repairs. Unfortunately, a Valakkar infestation is creating serious problems for not only the stations' infrastructure, but also for the chances of them being brought back online one day. Due to Valakkar's status as an invasive species, we have decided that culling them is the only viable option.\n \nReduce the Valakkar numbers at any of the old QV Breaker Stations and we will offer you payment.\n \nBest,\n \nWanda Werkheiser\n\nContract Manager\n\nHighpoint Wilderness Specialists\n\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- R97 Shotgun\n- Monde Arms\n- Monde Core\n- Monde Legs\n- Monde Helmet\n- Monde Arms Hiro\n- Monde Core Hiro\n- Monde Legs Hiro\n- Monde Helmet Hiro\n- R97 Shotgun Magazine (18 cap)\n
Highpoint_KillAnimals_Derelictoutpostscaves_Desc_E_001=Highpoint Wilderness is seeking a contractor to cull a pack of kopions that are threatening to overrun one of Citizens for Prosperity's outposts. After an initial assessment, it has been decided that relocation is impossible and a culling of them is the only viable option. If you're interested, head to <EM4>~mission(Location|Address)</EM4>  and once we've received confirmation that the task is complete we will send payment.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 75 / 100
Highpoint_Killanimals_Derelictoutpostscaves_Nearoutposts_Desc_E_001=Highpoint Wilderness needs someone to exterminate an overpopulated pack of kopions that's threatening one of CFP's settlements. This pack can be found at <EM4>~mission(Location|Address)</EM4>. Remember to exhibit caution when approaching them and arm yourself accordingly.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 75 / 100
Highpoint_Killanimals_Derelictoutpostscaves_Nearoutposts_Desc_M_001=Citizens for Prosperity have approached us with information that multiple groups of kopions have been attacking people at <EM4>~mission(Location|Address)</EM4> without provocation. Currently, no deaths have been reported, but they are concerned their most vulnerable will be at risk if these kopions continue running rampant.\n\nEnsure you are prepared adequately, kopions hunt in packs and it is easy to become overwhelmed by their sheer numbers.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 150
Highpoint_Killanimals_Derelictoutpostscaves_Desc_M_001=Citizens for Prosperity recently reported to us that one of their scouts was injured by kopions during a routine exploration mission. According to them, this isn't the first time this particular pack has posed a problem, so they've requested our services to clear out the area. The report shows they were last seen at <EM4>~mission(Location|Address)</EM4>.\n\nThis behavior is typical of kopions looking to expand their territory, so it is highly likely that you will be dealing with more kopions than initially observed. Caution is advised. \n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 25 / 50 / 100 / 150
Highpoint_KillAnimals_Derelictoutpostscaves_Desc_H_001=Members of the group Citizens for Prosperity were recently ambushed by several packs of kopions at <EM4>~mission(Location|Address)</EM4> and have requested Highpoint's services in dealing with them. For the safety of everyone trying to settle in the area, we require the immediate services of someone who can deal with this on our behalf.\n\nExpect a large number of animals and prepare yourself accordingly.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 300
Highpoint_Killanimals_Derelictoutpostscaves_Desc_E_002=We’re putting out a contract for anyone who is capable of hunting animals responsibly. Citizens for Prosperity needs a group of aggressive kopions who have been harassing their people culled from <EM4>~mission(Location|Address)</EM4>. After some initial monitoring, it looked as if they may on, but unfortunately we’ve been forced to take action. This is a relatively straightforward job, but when dealing with dangerous animals, cautious is always advised.\n\nBest,\n\nWanda Werkheiser\nContract Manager\nHighpoint Wilderness Specialists\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 75 / 100
RAIN_intro_desc_01=To all available contractors,\n\nRayari Incorporated is looking for independent contractors to provide additional support in our efforts to push the boundaries of science, agriculture, and medicine in the Empire and beyond. \n\nA research initiative at <EM4>~mission(Destination|Address)</EM4> is in desperate need of resources, so we are looking for a reliable contractor to obtain and deliver these crucial components.\n\nFor more information on the animals in question, refer to "The Guide to Stanton Wildlife" in your Journal.\n\nRayari offers competitive wages along with the knowledge that you're building a better universe.\n\nLet’s grow together,\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM4>Reputation Awarded:</EM4> 100
RAIN_collectresources_multiple_GEN_desc_01=To all available contractors,\n\nRayari scientists are hard at work trying to solve the issues with failing regen tech. Currently, their efforts are hindered by a lack of materials which they believe could be essential for their experiments.  \n\nIn particular, our scientists at <EM4>~mission(Destination|Address)</EM4> have had to put their work on hold after running out of those resources. With a restock from our normal provider not possible for months owing to short supply, we’ll pay a premium to anyone who can assist with restocking the materials.\n\nFor more information on the animals in question, refer to "Explorer's Guide to Harvestables" in your Journal.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 200\n<EM4>Multiple Blueprint Pools (Yormandi Eye Only)</EM4>\n<EM4>Awarded from Sr. Contractor level variants</EM4>\n<EM4>Pool 1</EM4>\n- P8-AR Rifle\n- Palatino Arms\n- Palatino Core\n- Palatino Legs\n- Palatino Helmet\n- Palatino Arms Moonfall\n- Palatino Core Moonfall\n- Palatino Legs Moonfall\n- Palatino Helmet Moonfall\n- P8-ARM Rifle Magazine (30 cap)\n\n<EM4>Pool 2</EM4>\n- Prism "Deep Sea" Laser Shotgun\n- Prism "Bonedust" Laser Shotgun\n- Prism "Firesteel" Laser Shotgun\n- Prism Laser Shotgun\n- Stirling Exploration Suit\n- Siebe Helmet\n- Prism Laser Shotgun Battery (20 cap)\n
RAIN_collectresources_single_OLP_desc_01=To all available contractors,\n\nOur research team at at <EM4>~mission(Destination|Address)</EM4> is working tirelessly on solving the current ‘Regen Crisis’ and addressing the issue of unstable imprints. Their work has produced promising results, but a lack of a key resource is impeding their ability to run further experiments. \n\nWe’ve received word from our supplier that increased demand combined with lower mining yields means that we won’t receive our scheduled shipment for another few months. Our research team can’t wait that long, and we’re hoping you can help.      \n\nThe resource is hard to come by, but we have it on good authority that the old Hathor mining facilities were built in areas with a high concentration of the ore. Since Hathor went defunct not long after establishing their operations in- system, there’s a good chance that activating one of these mining lasers could provide you with what we need.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 150\n\n<EM4>Potential Blueprints</EM4>\n- Pulse Laser Pistol\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Quartz Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Black Op" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG Battery (45 cap)\n- Pulse Laser Pistol Battery (60 Cap)\n
RAIN_collectresources_multiple_OLP_desc_01=To all available contractors,\n\nRayari scientists are hard at work trying to solve the issues with failing regen tech. Currently, their efforts are hindered by a lack of three resources essential for their experiments: <EM4>saldynium, jaclium, and carinite</EM4>.  \n\nIn particular, our scientists at <EM4>~mission(Destination|Address)</EM4> have had to put their work on hold after running out of those resources. With a restock from our normal provider not possible for months owing to short supply, we’ll pay a premium to anyone who can assist with restocking the materials.\n\nThough we haven’t been able to do thorough scans, there’s a strong belief among our teams that Hathor’s defunct Orbital Laser Platforms were built above areas with a high concentration of these resources. Reactivating these OLP could be your best hope of acquiring what we need.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Pulse Laser Pistol\n- Pulse "Blacklist" Pistol\n- Pulse "Rouge" Pistol\n- Quartz Energy SMG\n- Quartz "Deadfall" Energy SMG\n- Quartz "Black Op" Energy SMG\n- Quartz "Lumen" Energy SMG\n- Quartz Energy SMG Battery (45 cap)\n- Pulse Laser Pistol Battery (60 Cap)\n
RAIN_CollectResources_storm_desc_001=To all available contractors,\n\nWe at Rayari are dedicating all our energy to stopping the regeneration technology crisis in its tracks, but for our scientists to continue their efforts they need resources that the company's suppliers have been unable to deliver. \n\nThere is a sizeable population of kopions that have been exposed to radiation near <EM4>~mission(Location)</EM4>. Rayari is seeking an contractor to collect <EM4>irradiated kopion horns</EM4> and deliver them to <EM4>~mission(Destination|Address)</EM4>. Due to the scarcity of this resource, we are prepared to pay a high service fee. \n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM4>Reputation Awarded:</EM4> 150
RAIN_CollectResources_storm_desc_002=To all available contractors,\n\nWe at Rayari are stopping at nothing to halt the ongoing regeneration crisis, but to continue their efforts our scientists need a rare resource that the company's suppliers cannot obtain. \n\nRayari is seeking an experienced contractor to gather <EM4>irradiated valakkar pearls</EM4>, which can be extracted from adult valakkar that have been extensively exposed to radiation. Our scans have found a qualifying population inside the storm near <EM4>~mission(Location)</EM4>. Because these animals are highly dangerous, Rayari is prepared to generously compensate anyone who can assist with gathering the pearls. \n\nOnce attained, please take these valuable resources to <EM4>~mission(Destination|Address)</EM4>.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM4>Reputation Awarded:</EM4> 150
RAIN_CollectResources_storm_desc_003=To all available contractors,\n\nWe at Rayari are dedicating all our energy to stopping the regeneration technology crisis in its tracks, but to continue their efforts our scientists need materials that the company's suppliers cannot obtain. \n\nRayari is seeking an experienced contractor to gather <EM4>irradiated valakkar fangs</EM4>, which can be extracted from adult valakkar that have been extensively exposed to radiation. Our scans have uncovered the existence of a qualifying population inside the storm near <EM4>~mission(Location)</EM4>. \n\nBecause these animals are highly dangerous, Rayari is offering premium pay to anyone who can assist with collecting the fangs.  \n\nOnce attained, please take these valuable resources to <EM4>~mission(Destination|Address)</EM4>.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM4>Reputation Awarded:</EM4> 150
RAIN_CollectResources_storm_desc_004=To all available contractors,\n\nWe at Rayari are working day and night to solve the current regen crisis, but to continue their efforts our scientists need rare resources that the company's suppliers cannot deliver. \n\nWe are therefore seeking a contractor to secure an <EM4>irradiated valakkar egg</EM4>. Our scans have confirmed several radioactive storms with known a valakkar presence on Pyro I, you can find a shuttle near <EM4>~mission(Location)</EM4> that will take you inside the storm. One more thing, analysis indicates that these eggs will decay over time, the state of the egg shouldn't affect our research but sooner would be better.\n\nDue to the health risks associated with radiation exposure that will be needed to deliver a viable sample, Rayari is ready to pay well for anyone who can safely secure and deliver this item.\n\nOnce attained, please take this valuable resource to <EM4>~mission(Destination|Address)</EM4>.\n\nTogether we can make the universe better for all.\n\nNarina Lerrem\nSenior Manager\nClinical Research Outsourcing\n\n<EM4>Reputation Awarded:</EM4> 150
Covalex_Delivery_Stanton_Medium_Desc_001=Hi,\n\nLooking for a contractor with a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> to run a delivery for us across Stanton.\n\nThis isn't a particularly long delivery route, but you will be moving between couple of different locations. To make sure things go smoothly, bring enough fuel and a <EM4>handheld tractor beam</EM4> to speed up moving the boxes.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 100
Covalex_Delivery_Nyx_Medium_Desc_001=Hi,\n\nPretty straightforward this one - We've got a bunch of stuff that needs moving through Nyx and need a competent contractor with a <EM4>handheld tractor beam</EM4> and a ship that can carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nDetails are attached. Good luck out there!\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 100
Covalex_Delivery_Stanton_Hard_Desc_001=Hi,\n\nNeed a reliable contractor to pick up some packages for us and deliver them to their destination.\n\nThis route is a longer one so make sure you have enough fuel and don't forget a <EM4>handheld tractor beam</EM4>.\n\nAnd not sure what you were planning on flying, but you'll need a ship that can transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 100
Covalex_Delivery_Stanton_VeryHard_Desc_001=Hiya,\n\nCovalex requires a safe pair of hands to pick up some packages and get them where they need to go.\n\nDesignating this a long distance delivery so stock up on fuel and supplies. And definitely make sure you bring a <EM4>handheld tractor beam</EM4>.\n\nAs for what ship to bring, you'll also need something that can move <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 150
Covalex_Delivery_Stanton_Super_Desc_001=Got a special assignment - Loads of packages ready to delivered across the system. Its a bit more than the usual so I'm only reaching out to my best contractors for this one.\n\nObviously, a part of that payment will be to cover your fuel because you'll be going super far with this one. You'll need all the usual as well like a <EM4>handheld tractor beam</EM4> and a ship with space to store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\nGood luck. I'm counting on you.\n\n~mission(Contractor|SignOff)\n\nElla Tieno\nJr. Logistics Coordinator\nCovalex Shipping\n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 200
Covalex_HaulCargo_AtoB_desc_ToRuinStation=Hiya, \n\nLooking for a hauler willing to make a run to Ruin Station. Know hauls to Pyro can give some people pause, but this is one we do regularly to help supply the station. I’ve also confirmed that everything on the cargo manifest is above board. \n\nIf you’re interested, the cargo is ready for pick up at <EM4>~mission(Location|Address)</EM4>.  Make sure you bring a <EM4>handheld tractor beam</EM4> and a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> otherwise it might be a little rough.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_AtoB_desc_ToLevski=Hi, \n\nThere’s a bunch of cargo at <EM4>~mission(Location|Address)</EM4> that needs to be moved to Levski. The People’s Alliance has a standing order for this stuff because they desperately need it, but it’s not easy to get in Nyx. Funny how they don’t want to be part of the UEE but still rely on us for their survival.  \n\nAnyway, you’ll need a <EM4>handheld tractor beam</EM4> and a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> to knock this one out. \n\n~mission(Contractor|SignOff) \n \nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_AtoB_desc_FromLevski=Hey there, \n\nSo the People’s Alliance hired us to move a load of cargo from Levski to <EM4>~mission(Destination|Address)</EM4>. Honestly, I’m surprised that they export some of this stuff, but I guess they must sell something to be able to afford everything they import. \n\nFor the run itself, you’ll need a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>handheld tractor beam</EM4> to handle the containers. That should be it.  \n\n~mission(Contractor|SignOff)\n  \nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_AtoB_desc_FromRuinStation=Hey, it’s El. \n\nGot a client at <EM4>~mission(Location|Address)</EM4>, who needs their cargo picked up from Ruin Station. They’ve been waiting there a while and are starting to get a bit impatient. Any chance you could handle this for us? \n\nYou’ll need a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>handheld tractor beam</EM4> to be able to move them. \n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_SingleToMulti_desc_ToCFP_Danger=Hi, \n\nSeveral Citizens for Prosperity outposts in Pyro need supplies. It seems like we regularly do runs like this for them, but this one looks like it might be a bit riskier. A CFP rep let me know that outlaw activity around these sites has spiked recently, but they desperately need these outposts restocked, so we’re going ahead with the delivery. <EM4>Just a head’s up that you could run into trouble, so come prepared</EM4>.       \n\nAll the cargo’s waiting at <EM4>~mission(Location|Address)</EM4> and here’s where it’s heading:  \n\nDROP OFF LOCATIONS (ANY ORDER) \n\n~mission(SingleToMultiToken)  \n\nAccording to the manifest, the largest cargo container you’ll need to deal with is <EM4>~mission(MissionMaxSCUSize)</EM4>. Aside from that, remember to bring a <EM4>handheld tractor beam</EM4> along.    \n\n~mission(Contractor|SignOff) \n  \nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_SingleToMulti_desc_Valakkar_Timed=Hi, \n\nOur client took down a Valakkar and processed it into organics. They've got buyers lined up and waiting for the stuff at a few different locations, so I need someone to go to <EM4>~mission(Location|Address)</EM4>, grab it all, and then deliver it to the following spots:    \n\nDROP OFF LOCATIONS (ANY ORDER) \n\n~mission(SingleToMultiToken)  \n\nAccording to the manifest, the largest cargo container you’ll need to deal with is <EM4>~mission(MissionMaxSCUSize)</EM4>. Don’t forget to bring your <EM4>handheld tractor beam</EM4>. Not sure how you’d move this stuff without it.    \n\n~mission(Contractor|SignOff)   \n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_AtoB_desc_DeliverAll=Hiya, \n\nHere’s the deal, I need someone good for a special run. We’ve got an important client that’s threatening to take their business elsewhere, because their deliveries are consistently missing cargo. They’re demanding that 100% of the cargo be delivered on this run, or they won’t pay. Since this was before my time and my supervisor wants to show that it won’t happen again, they agreed with this. Anyway, I think you might be a good fit. \n\nIf you’re willing to take that risk too, here are all the pertinent details. The cargo can be collected from <EM4>~mission(Location|Address)</EM4> and delivered to <EM4>~mission(Destination|Address)</EM4>. Looks like the largest cargo container you’ll need to handle is <EM4>~mission(MissionMaxSCUSize)</EM4>, so be sure to bring a ship big enough and a <EM4>handheld tractor beam</EM4> to help you move those containers around.  \n \n~mission(Contractor|SignOff) \n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Master level variants</EM4>\n- VK-00 (Quantum Drive)\n- Siren (Quantum Drive)\n- XL-1 (Quantum Drive)\n- Yeager (Quantum Drive)\n- Balandin (Quantum Drive)\n- TS-2 (Quantum Drive)\n- Palisade (Shield)\n- Rampart (Shield)\n- Parapet (Shield)\n
Covalex_HaulCargo_AToB_Intro_desc=Earning such accolades as 'Imperial Finances' Top 10 Shipping Companies' and 'Delivery Digest's 2945's Most Trusted Transport,' Covalex is busier than ever. And that means more cargo going to more places. That's where you come in.  \n\nCovalex is looking for dependable and industrious pilots to join our expanding family. Do you have access to a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>? Can you pass an Advocacy background check if required? Then a universe of opportunity is waiting for you. \n\nSimply complete an 'Evaluation Trial’ by picking up a shipment of <EM4>~mission(Item)</EM4> from a freight elevator at <EM4>~mission(Location|Address)</EM4> and successfully delivering it to a freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nUpon satisfactory completion, you'll be eligible to become part of Covalex Shipping's vast network of independent transport specialists*.\n\nBy the way, we strongly encourage contractors to bring a <EM4>handheld tractor beam</EM4> along.   \n\n\nCovalex Shipping  \n'Anything you need, anywhere you need it.'\n\n\n\n\n\n\n\n*Covalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 100
Covalex_RecoverCargo_VeryEasy_Description=Hi,\n\nSo I had a contractor who was supposed to deliver some stuff for us but has completely gone off the radar. I've pinged their ship and I've got no idea what's happened but they're floating around somewhere over at <EM4>~mission(Location|Address)</EM4>. If you could head over there recover the cargo and take it to the freight elevator at <EM4>~mission(Destination|Address)</EM4> you'd be doing me a huge favor.\n\nDon't forget to bring a <EM4>heavy-duty tractor beam</EM4> to move all the cargo. Oh and a ship that can transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 50
Covalex_RecoverCargo_Easy_Description=Hiya,\n\nI've got a client who's been messaging me all morning about a shipment they were supposed to receive and when I checked up on the cargo it turns out that it's sitting completely still in the middle of space.\n\nThis is obviously bad for a number of reasons, and not just because I had to spend 20 minutes getting yelled at. Can you head over to <EM4>~mission(Location|Address)</EM4> and see what happened? The original contract called for a ship that could carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> so make sure you've got that and a <EM4>heavy-duty tractor beam</EM4>.\n\nOnce you've got the cargo, can you make sure it's delivered to the freight elevator at <EM4>~mission(Destination|Address)</EM4>? Thanks a bunch.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 100
Covalex_RecoverCargo_Medium_Description=Hey El here,\n\nGot a weird one for you. I was checking the delivery stats for the past week and noticed some discrepancies. Seems we have a couple of deliveries marked as fulfilled but the cargo trackers are still showing as active.\n\nOne of these is located at <EM4>~mission(Location|Address)</EM4> so I was hoping you could fly over and get to the bottom of this. The order says the hauler was using a ship that could carry <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> so make sure you have the same. A <EM4>heavy-duty tractor beam</EM4> is a must for this one too.\n\nThat cargo needs to be delivered yesterday, so as soon as you've got it take it to a freight elevator at <EM4>~mission(Destination|Address)</EM4> and I'll get your payment sorted for you.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 150
Covalex_RecoverCargo_Hard_Description=Hi, it's El.\n\nNeed a hauler for a job ASAP. One of our contractors had a "personal emergency" and had to ditch their ship and it seems like they're not coming back. Not ideal, really.\n\nGood news is the cargo is still intact, at least according to the tracker. It'd be a huge win for me if you could finish the job by grabbing the cargo at <EM4>~mission(Location|Address)</EM4> and bringing it to the freight elevator at <EM4>~mission(Destination|Address)</EM4>.\n\nSeems like this was a pretty big one, you'll need a ship that can transport <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to move it all. Really appreciate your help.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 200
Covalex_RecoverCargo_VeryHard_Description=Hi,\n\nHere's the situation. After spending an hour on comms talking to the hauler, trying to help them diagnose what's wrong with their ship, it's been decided that we now need to get someone to head over to <EM4>~mission(Location|Address)</EM4> and complete the delivery.\n\nThis is a pretty big one. You'll need a ship that can store <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and unless you're super strong a <EM4>heavy-duty tractor beam</EM4> to shift it all.\n\nI would really appreciate if we could just get this one done. Take the cargo to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we can put this all behind us.\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 50 / 200
Covalex_RecoverCargo_Super_Description=Hey,\n\nOnly looking for contractors who are the best of the best for this one. One of our most valued clients is expecting an incredibly important shipment which is now seriously overdue.\n\nHere at Covalex, we pride ourselves on treating all of our clients equally, offering outstanding levels of service regardless of what we're delivering. That being said, if we lose this contract someone's gonna be in hot water and I really can't afford for that person to be me.\n\nThe tracker is reporting that the last contractor's ship is over at <EM4>~mission(Location|Address)</EM4>. Don't take any chances with this one, you'll need a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4> and a <EM4>heavy-duty tractor beam</EM4> to collect it all.\n\nDeliver the shipment to the freight elevator at <EM4>~mission(Destination|Address)</EM4> and we can put this whole mess behind us. And you'll make a sizeable heap of credits in the process. Not bad, right?\n\n~mission(Contractor|SignOff)\n\nElla Tieno \nJr. Logistics Coordinator \nCovalex Shipping   \n'Anything you need, anywhere you need it.' \n\n\n\n\n\n\n\nCovalex Shipping is a limited liability corporation. To encourage timely deliveries and prevent fraud on cargo hauls, Covalex Shipping will set a delivery time limit and upon expiration, any undelivered cargo will be considered stolen and treated as such. Total payment will be prorated according to the percentage of cargo successfully delivered.\n\n<EM4>Reputation Awarded:</EM4> 300
FTL_Courier_Stanton_Easy_Desc_001=AVAILABLE FTL CONTRACT\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS** \nA reliable and hardworking entry-level courier is needed to ferry a delivery in Stanton.\nYou will be responsible for providing your own transportation.\nInterested contractors need the <EM4>ability to lift up to .25 SCU boxes</EM4>.\nContractors are employed on an independent basis and therefore not covered by FTL's company insurance.\n\n~mission(Contractor|SignOff)\n\n<EM4>Reputation Awarded (by difficulty):</EM4> 100 / 500\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Colossus (Quantum Drive)\n- Huracan (Quantum Drive)\n- Agni (Quantum Drive)\n- Defiant (Powerplant)\n- Endurance (Powerplant)\n- Sedulity (Powerplant)\n
FTL_Courier_Nyx_Easy_Desc_001=AVAILABLE FTL CONTRACT\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS**\nFTL requires an entry-level courier to complete deliveries in Nyx.\nCourier must provide own transportation.\nPrior training in manual lifting is preferred, with the <EM4>ability to move boxes of up to .25 SCU</EM4> in weight.\nBy accepting this contract you agree to take full responsibility for the safety of the assigned packages.\n\n~mission(Contractor|SignOff)\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Neutral level variants</EM4>\n- Colossus (Quantum Drive)\n- Huracan (Quantum Drive)\n- Agni (Quantum Drive)\n- Defiant (Powerplant)\n- Endurance (Powerplant)\n- Sedulity (Powerplant)\n
FTL_Courier_Stanton_Medium_Desc_001=AVAILABLE FTL CONTRACT\nFOR IMMEDIATE ASSIGNMENT\n\n**CONTRACT DETAILS**\nJunior-level courier needed for deliveries across the Stanton System.\nTransportation must be provided by courier.\nYou will be <EM4>required to lift up to .25 SCU</EM4> in weight.\nCouriers are responsible for the correct handling and safety of all packages charged to their care.\n\n~mission(Contractor|SignOff)\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Jr. Contractor level variants</EM4>\n- Colossus (Quantum Drive)\n- Huracan (Quantum Drive)\n- Agni (Quantum Drive)\n- Defiant (Powerplant)\n- Endurance (Powerplant)\n- Sedulity (Powerplant)\n
spacecollect_cargo_desc_intro_01=~mission(Contractor|RecoverSpaceDescriptionIntro)\n\n<EM4>Reputation Awarded:</EM4> 100
