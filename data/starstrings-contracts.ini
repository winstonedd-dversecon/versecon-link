LingFamily_HaulCargo_AToB_Intro_desc=Hi,  \n \nThis is Petra Ling, and I’m proud to offer you a new and exciting opportunity to partner with Ling Family Hauling. When my parents started this company, their goal was to provide fast and reliable courier deliveries around the greater Crusader area. It quickly became a success, and as our reputation grew, so did our operations.  \n \nNow, under my stewardship, Ling Family Hauling is taking the next big step – cargo hauling. Demand for this new service is growing faster than I expected, and that’s great news for both of us.   \n \nIf you’ve ever wanted to be a hauler, then I can make your dreams come true. Best way to learn something is by doing it, and I’ve got a haul of <EM4>~mission(Item)</EM4> that needs to go from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>.  \n\nNo prior experience is necessary, but here’s a few things to keep in mind. All pick-ups and deliveries must be done at a freight elevator or autoloaded. You will need a ship that can hold <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>, and a <EM4>handheld tractor beam</EM4> to move them around. \n \nUpon successful completion of this delivery, you will be promoted to a ‘trusted contractor’ status and more hauls will become available to you.     \n\n \nSincerely,  \nPetra Ling  \nManaging Director of Cargo Operations \nLing Family Hauling \n\n \n\n \n\n \n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Trainee level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_MultiToSingle_desc_Party=Hi, \n\nGuess the folks at <EM4>~mission(Destination|Address)</EM4> are planning a party and need help acquiring everything in a timely manner. You’ll need to make multiple pick-ups for this one, including one in Nyx to grab some Jynx gin. Not sure if you’ve ever had the stuff, but it’s a Nyx specialty. Some folks can’t get past that it glows pink, but I love it. Got a truly unique kick to it.\n\nHere are the pick ups:  \n\nPICK UP LOCATIONS (ANY ORDER) \n\n~mission(MultiToSingleToken)     \n\nPlease remember to bring a <EM4>handheld tractor beam</EM4>, as you’ll be handling cargo containers up to <EM4>~mission(MissionMaxSCUSize)</EM4>.  \n\n  \nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_MultiToSingle_desc_CFPAmenities=Hey, \n \nAny chance you’d be willing to do a haul into Pyro? I know it can get dangerous there but this is for a good cause. A group of new CFP members have moved to <EM4>~mission(Destination|Address)</EM4> and had a tough time adjusting to life in the system. They all left stuff behind in Stanton, because their transporter didn’t have room, so we’ve been hired to pick it all up and bring it to them.      \n\nHere are the pick ups:   \n\nPICK UP LOCATIONS (ANY ORDER)   \n\n~mission(MultiToSingleToken) \n\nCFP leaders hope that bringing them this stuff will make the system feel more like home. Let’s make sure this one goes down smoothly. Remember to equip your <EM4>handheld tractor beam</EM4>, and a ship that can fit <EM4>~mission(MissionMaxSCUSize) cargo containers</EM4>. \n \n\nHappy Hauling,  \nReyes Ling \nCargo Logistics Coordinator \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Rookie level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
LingFamily_HaulCargo_AToB_desc_Fruit_Timed=Hi, \n \nNormally Reyes schedules our hauls, but she’s gone for the day, and I just got a comm inquiring about a simple, direct run from <EM4>~mission(Location|Address)</EM4> to <EM4>~mission(Destination|Address)</EM4>. The cargo is a load of fruit that will lose its value if it spoils. We don't want to anger this client, so would appreciate it if you knocked this out in a timely manner.  \n\nHere’s some other details you should know. The largest container used is <EM4>~mission(MissionMaxSCUSize)</EM4>, so don’t forget your <EM4>handheld tractor beam</EM4>. \n\n \nSincerely,  \nPetra Ling  \nManaging Director of Cargo Operations \nLing Family Hauling\n\n\n\n\n\n\n\nLing Family Hauling knows it’s a dangerous and unpredictable universe and has established several protocols to protect both you and our client’s cargo. To ensure you aren’t punished for circumstances outside of your control, total payment will be prorated to the percentage of cargo successfully delivered. A delivery timer will be set for each haul. Any cargo that remains undelivered upon its expiration will be flagged as stolen and treated as such. All pick-ups and deliveries must be autoloaded or done at a freight elevator.\n\n<EM4>Reputation Awarded:</EM4> 100\n\n<EM4>Potential Blueprints</EM4>\n<EM4>Awarded from Rookie level variants</EM4>\n- Spectre (Quantum Drive)\n- Zephyr (Quantum Drive)\n- Bolt (Quantum Drive)\n- Spicule (Quantum Drive)\n- Guardian (Shield)\n- Citadel (Shield)\n- Barbican (Shield)\n
