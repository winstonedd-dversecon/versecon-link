<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SQUAD HUD</title>
    <style>
        :root {
            --bg: rgba(0, 0, 0, 0.4);
            --border: rgba(0, 255, 136, 0.3);
            --accent: #00ff88;
            --danger: #ff4444;
            --warning: #ffaa00;
            --text: #ffffff;
            --font: 'Segoe UI', Roboto, sans-serif;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 10px;
            background: transparent;
            color: var(--text);
            font-family: var(--font);
            overflow: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .hud-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .unit-box {
            background: var(--bg);
            border-left: 3px solid var(--accent);
            padding: 8px 12px;
            border-radius: 0 4px 4px 0;
            position: relative;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            -webkit-app-region: no-drag;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .unit-box.mia {
            border-left-color: #555;
            opacity: 0.6;
        }

        .unit-box.dead {
            border-left-color: var(--danger);
            background: rgba(255, 0, 0, 0.2);
        }

        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .unit-name {
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            max-width: 180px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .unit-health-text {
            font-size: 0.75rem;
            font-weight: 800;
            font-family: monospace;
        }

        .health-bar-container {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
            margin: 4px 0;
        }

        .health-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--accent);
            transition: width 0.5s ease;
        }

        .unit-location {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.6);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .status-tag {
            position: absolute;
            top: -5px;
            right: 5px;
            font-size: 0.55rem;
            background: var(--accent);
            color: #000;
            padding: 1px 4px;
            border-radius: 2px;
            font-weight: bold;
            display: none;
        }

        .unit-box.mia .status-tag { display: block; background: #666; color: #fff; content: 'MIA'; }
        .unit-box.dead .status-tag { display: block; background: var(--danger); color: #fff; content: 'KIA'; }

    </style>
</head>
<body>
    <div class="hud-container" id="hud-list">
        <!-- Units populated here -->
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        ipcRenderer.on('squad:update', (event, data) => {
            const { peers } = data;
            renderHud(peers);
        });

        function renderHud(peers) {
            const container = document.getElementById('hud-list');
            const handles = Object.keys(peers).sort((a, b) => {
                // Keep host at top
                if (peers[a].isHost) return -1;
                if (peers[b].isHost) return 1;
                return a.localeCompare(b);
            });

            // Keep track of current elements to avoid flickering
            const existingKeys = Array.from(container.querySelectorAll('.unit-box')).map(el => el.dataset.handle);
            
            // For now, simplify and redraw
            container.innerHTML = '';
            
            handles.forEach(handle => {
                const p = peers[handle];
                const now = Date.now();
                const diff = (now - p.lastUpdate) / 1000;
                const isMia = diff > 20;
                const isDead = p.health <= 5;
                
                const box = document.createElement('div');
                box.className = `unit-box ${isMia ? 'mia' : ''} ${isDead ? 'dead' : ''}`;
                box.dataset.handle = handle;
                
                let healthColor = 'var(--accent)';
                if (isDead) healthColor = 'var(--danger)';
                else if (p.health < 40) healthColor = 'var(--warning)';

                box.innerHTML = `
                    <div class="status-tag">${isDead ? 'KIA' : (isMia ? 'MIA' : '')}</div>
                    <div class="unit-header">
                        <div class="unit-name">${handle}</div>
                        <div class="unit-health-text" style="color: ${healthColor}">${p.health}%</div>
                    </div>
                    <div class="health-bar-container">
                        <div class="health-bar-fill" style="width: ${p.health}%; background: ${healthColor}"></div>
                    </div>
                    <div class="unit-location">${p.location || 'Unknown Orbit'}</div>
                `;
                
                container.appendChild(box);
            });
        }
    </script>
</body>
</html>
