<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OCR DEBUG VIEW</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: rgba(0, 0, 0, 0.9);
            color: #00ff88;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #00ff88;
            height: 100vh;
        }
        .header {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px;
            background: rgba(0, 255, 136, 0.2);
            width: 100%;
            text-align: center;
            -webkit-app-region: drag;
            display: flex;
            justify-content: space-between;
            box-sizing: border-box;
        }
        #canvas-container {
            position: relative;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            overflow: auto;
            background: #111;
        }
        canvas {
            image-rendering: pixelated;
            max-width: 100%;
            max-height: 100%;
        }
        .footer {
            background: rgba(0,0,0,0.5);
            width: 100%;
            padding: 4px;
            font-size: 0.55rem;
            text-align: center;
            border-top: 1px solid rgba(0, 255, 136, 0.2);
        }
        .close-btn {
            -webkit-app-region: no-drag;
            cursor: pointer;
            padding: 0 5px;
        }
        .close-btn:hover { color: #ff3333; }
    </style>
</head>
<body>
    <div class="header">
        <span>OCR CLUSTER TRACKER</span>
        <span onclick="window.close()" class="close-btn">✕</span>
    </div>
    
    <div id="canvas-container">
        <canvas id="debug-canvas"></canvas>
    </div>

    <div class="footer" id="status-text">WAITING FOR CLUSTER SCAN...</div>

    <script>
        const { ipcRenderer } = require('electron');
        const canvas = document.getElementById('debug-canvas');
        const ctx = canvas.getContext('2d');
        const statusText = document.getElementById('status-text');
        
        let lastImage = null;
        let lastMetadata = null;

        ipcRenderer.on('ocr:debug-update', (event, dataUrl) => {
            const img = new Image();
            img.onload = () => {
                lastImage = img;
                render();
            };
            img.src = dataUrl;
        });

        ipcRenderer.on('ocr:debug-metadata', (event, data) => {
            lastMetadata = data;
            if (data.finalValue !== null) {
                statusText.textContent = `TRACKING: ${data.finalValue}% (Strategy: ${data.strategy})`;
                statusText.style.color = '#00ff88';
            } else {
                statusText.textContent = `SCAN FAILED (Check debugger labels)`;
                statusText.style.color = '#ff6666';
            }
            render();
        });

        // v2.10.4 - Manual Calibration via Click
        canvas.addEventListener('click', (e) => {
            if (!lastMetadata || !lastImage) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            // 1. Check if we clicked on a candidate number
            const clickedNumber = lastMetadata.words.find(w => 
                x >= w.bbox.x0 && x <= w.bbox.x1 && y >= w.bbox.y0 && y <= w.bbox.y1
            );

            if (clickedNumber && lastMetadata.anchor) {
                console.log('[Debug] Manual Health Selected:', clickedNumber.val);
                ipcRenderer.send('ocr:manual-calibrate', {
                    type: 'HEALTH',
                    val: clickedNumber.val,
                    x: (clickedNumber.bbox.x0 + clickedNumber.bbox.x1) / 2,
                    y: (clickedNumber.bbox.y0 + clickedNumber.bbox.y1) / 2,
                    anchor: lastMetadata.anchor
                });
                return;
            }

            // 2. Check if we clicked on an anchor char (from allWords)
            if (lastMetadata.allWords) {
                const clickedAnchor = lastMetadata.allWords.find(w => 
                    x >= w.bbox.x0 && x <= w.bbox.x1 && y >= w.bbox.y0 && y <= w.bbox.y1
                );
                if (clickedAnchor) {
                    console.log('[Debug] Manual Anchor Selected:', clickedAnchor.text);
                    ipcRenderer.send('ocr:manual-calibrate', {
                        type: 'ANCHOR',
                        text: clickedAnchor.text
                    });
                }
            }
        });

        function render() {
            if (!lastImage) return;

            // Sync canvas size to image
            if (canvas.width !== lastImage.width || canvas.height !== lastImage.height) {
                canvas.width = lastImage.width;
                canvas.height = lastImage.height;
            }

            // Draw Base Image
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(lastImage, 0, 0);

            if (lastMetadata) {
                // v2.10.3 - Draw all detected text (Raw Diagnostic)
                if (lastMetadata.allWords) {
                    ctx.font = '7px sans-serif';
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    lastMetadata.allWords.forEach(w => {
                        ctx.fillText(w.text, w.bbox.x0, w.bbox.y0 - 2);
                    });
                }

                // Draw all numeric candidates (Red)
                ctx.lineWidth = 1;
                lastMetadata.words.forEach(w => {
                    ctx.strokeStyle = 'rgba(255, 50, 50, 0.5)';
                    ctx.strokeRect(w.bbox.x0, w.bbox.y0, w.bbox.x1 - w.bbox.x0, w.bbox.y1 - w.bbox.y0);
                });

                // Draw Anchor (Blue Crosshair)
                if (lastMetadata.anchor) {
                    const ax = (lastMetadata.anchor.bbox.x0 + lastMetadata.anchor.bbox.x1) / 2;
                    const ay = (lastMetadata.anchor.bbox.y0 + lastMetadata.anchor.bbox.y1) / 2;
                    
                    ctx.strokeStyle = '#3399ff';
                    ctx.setLineDash([2, 2]);
                    ctx.beginPath();
                    ctx.moveTo(ax, 0); ctx.lineTo(ax, canvas.height);
                    ctx.moveTo(0, ay); ctx.lineTo(canvas.width, ay);
                    ctx.stroke();
                    ctx.setLineDash([]);
                    
                    // Box around anchor
                    ctx.strokeRect(lastMetadata.anchor.bbox.x0, lastMetadata.anchor.bbox.y0, 
                                   lastMetadata.anchor.bbox.x1 - lastMetadata.anchor.bbox.x0, 
                                   lastMetadata.anchor.bbox.y1 - lastMetadata.anchor.bbox.y0);
                    
                    ctx.fillStyle = '#3399ff';
                    ctx.font = 'bold 8px monospace';
                    ctx.fillText(`ANCHOR: "${lastMetadata.anchor.text}"`, lastMetadata.anchor.bbox.x1 + 2, lastMetadata.anchor.bbox.y0 + 8);
                }

                // Draw Selected Value (Green)
                const selected = lastMetadata.words.find(w => w.val === lastMetadata.finalValue);
                if (selected) {
                    ctx.strokeStyle = '#00ff88';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(selected.bbox.x0, selected.bbox.y0, 
                                   selected.bbox.x1 - selected.bbox.x0, 
                                   selected.bbox.y1 - selected.bbox.y0);
                }
            }
        }
    </script>
</body>
</html>
