<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CNC | Command & Control</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.8);
            --border: #333;
            --accent: #ffa500;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --font: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            padding: 20px;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            overflow-x: hidden;
            user-select: none;
            -webkit-app-region: drag;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 10px;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .header-meta {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .squad-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            -webkit-app-region: no-drag;
        }

        .unit-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 15px;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .unit-card:hover { border-color: var(--accent); }

        .unit-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .unit-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
        }

        .unit-team {
            font-size: 0.7rem;
            background: #222;
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--accent);
            text-transform: uppercase;
        }

        .health-section { margin-top: 10px; }

        .health-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            margin-bottom: 5px;
            color: var(--text-dim);
        }

        .health-bar-bg {
            width: 100%;
            height: 8px;
            background: #111;
            border-radius: 4px;
            overflow: hidden;
        }

        .health-bar-fill {
            height: 100%;
            width: 100%;
            background: var(--success);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease;
        }

        .unit-meta {
            display: flex;
            justify-content: space-between;
            margin-top: 15px;
            font-size: 0.65rem;
            color: #555;
        }

        .unit-status {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--success);
            box-shadow: 0 0 5px var(--success);
        }

        .unit-card.mia { opacity: 0.5; border-style: dashed; }
        .unit-card.mia .status-dot { background: #555; box-shadow: none; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 100px 0;
            color: #333;
            font-size: 1.2rem;
            border: 2px dashed #1a1a1a;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
            -webkit-app-region: no-drag;
        }

        .control-btn {
            background: #1a1a1a;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 5px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .control-btn:hover { background: #222; color: var(--text); }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #333; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">CNC | Squad Ops</div>
        <div class="header-meta">
            <div id="connection-status">Relay: Searching...</div>
            <div id="unit-count">0 Active Units</div>
        </div>
    </div>

    <div class="squad-grid" id="squad-list">
        <div class="empty-state">Waiting for squad members to connect...</div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="window.close()">Close Dashboard</button>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let squad = {};

        ipcRenderer.on('squad:update', (e, data) => {
            const { role, peers } = data;
            const statusEl = document.getElementById('connection-status');
            statusEl.textContent = `Role: ${role}`;
            statusEl.style.color = role === 'HOST' ? 'var(--success)' : (role === 'JOIN' ? 'var(--accent)' : 'var(--danger)');

            renderSquad(peers);
        });

        function renderSquad(peers) {
            const list = document.getElementById('squad-list');
            const countEl = document.getElementById('unit-count');
            
            const handles = Object.keys(peers);
            countEl.textContent = `${handles.length} Active Units`;

            if (handles.length === 0) {
                list.innerHTML = '<div class="empty-state">Waiting for squad members to connect...</div>';
                return;
            }

            list.innerHTML = '';
            handles.forEach(handle => {
                const p = peers[handle];
                const now = Date.now();
                const diff = (now - p.lastUpdate) / 1000;
                const isMia = diff > 20; // 20s without update = MIA

                const card = document.createElement('div');
                card.className = `unit-card ${isMia ? 'mia' : ''}`;
                
                let healthColor = 'var(--success)';
                if (p.health < 30) healthColor = 'var(--danger)';
                else if (p.health < 60) healthColor = 'var(--warning)';

                card.innerHTML = `
                    <div class="unit-header">
                        <div class="unit-name">${handle}</div>
                        <div class="unit-team">${p.team || 'Alpha'}</div>
                    </div>
                    <div class="health-section">
                        <div class="health-label">
                            <span>VITAL SIGNS</span>
                            <span style="color: ${healthColor}">${p.health}%</span>
                        </div>
                        <div class="health-bar-bg">
                            <div class="health-bar-fill" style="width: ${p.health}%; background: ${healthColor}"></div>
                        </div>
                    </div>
                    <div class="unit-meta">
                        <div class="unit-status">
                            <div class="status-dot"></div>
                            <span>${isMia ? 'SIGNAL LOST' : 'ACTIVE'}</span>
                        </div>
                        <div>LAST SYNC: ${Math.round(diff)}s ago</div>
                    </div>
                `;
                list.appendChild(card);
            });
        }

        // Auto-refresh for MIA status
        setInterval(() => {
            // Re-render handled by squad:update, but we might want a local ticker
        }, 1000);
    </script>
</body>
</html>
