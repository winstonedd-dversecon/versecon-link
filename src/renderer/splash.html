<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>VerseCon Link - Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0b0c10;
            --accent: #ffa500;
            --cyan: #00c8ff;
            --text-main: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Rajdhani', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255, 165, 0, 0.2);
            box-shadow: inset 0 0 20px rgba(0, 200, 255, 0.1);
        }

        .container {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .logo-text {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--accent), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(255, 165, 0, 0.2);
            animation: pulseText 2s infinite alternate;
        }

        .subtitle {
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: #8892b0;
            text-transform: uppercase;
            margin-top: -10px;
        }

        /* Cyber Loading Spinner */
        .spinner-outer {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--accent);
            border-bottom-color: var(--cyan);
            animation: spin 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.2);
        }

        .spinner-inner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-left-color: var(--cyan);
            border-right-color: var(--accent);
            animation: spinReverse 1.6s linear infinite;
        }

        .status-message {
            font-size: 0.7rem;
            letter-spacing: 1px;
            color: var(--cyan);
            text-transform: uppercase;
            animation: blink 1s infinite alternate;
            margin-top: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes spinReverse {
            to { transform: rotate(-360deg); }
        }

        @keyframes pulseText {
            from { text-shadow: 0 0 10px rgba(255, 165, 0, 0.1); }
            to { text-shadow: 0 0 20px rgba(0, 200, 255, 0.4); }
        }

        @keyframes blink {
            from { opacity: 0.4; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner-outer">
            <div class="spinner-inner"></div>
        </div>
        <div>
            <h1 class="logo-text">VerseCon Link</h1>
            <p class="subtitle">Neural Telemetry Link</p>
        </div>
        <p class="status-message">Initializing Engine...</p>
    </div>
</body>
</html>
